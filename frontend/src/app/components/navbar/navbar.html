<div class="pt-3 px-4 sm:px-6">
  <div class="navbar mx-auto max-w-5xl min-h-0 rounded-2xl border border-white/15 bg-white/10 px-4 py-2 shadow-lg backdrop-blur-md">
    <div class="navbar-start">
      <div class="dropdown">
        <div tabindex="0" role="button" class="btn btn-ghost btn-circle btn-sm">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7" />
          </svg>
        </div>

        <ul tabindex="-1" class="menu menu-sm dropdown-content bg-base-100/90 rounded-box z-10 mt-3 w-52 p-2 shadow backdrop-blur-md">
          @for (element of dropdownButtonsList; track element.id) {
            <li><a [routerLink]="element.url">{{ element.name }}</a></li>
          }
        </ul>
      </div>

      <a class="btn btn-ghost btn-sm text-xl" routerLink="">
        {{ mainButtonText() }}
      </a>
    </div>

    <div class="navbar-end">
      <div class="dropdown dropdown-end">
        @if (!isLoggedIn()) {
          <a class="btn btn-ghost btn-sm rounded-xl" routerLink="login">Log In</a>
          <a class="btn btn-ghost btn-sm rounded-xl" routerLink="register">Sign Up</a>
        } @else {
          <a class="btn btn-ghost btn-sm rounded-full" routerLink="profile">{{ username() }}</a>
        }
      </div>
    </div>
  </div>
</div>
