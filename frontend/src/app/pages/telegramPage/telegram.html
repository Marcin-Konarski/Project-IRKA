<div class="auth-container">
  <div class="card">
    <h1>Verify with Telegram</h1>
    
    @if (!codeRequested()) {
      <!-- Phone Input -->
      <form (ngSubmit)="requestCode()">
        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input
            type="tel"
            id="phone"
            [(ngModel)]="phone"
            name="phone"
            placeholder="e.g., +48123456789"
            required
          />
        </div>
        <button type="submit" [disabled]="loading()">
          {{ loading() ? 'Sending...' : 'Send Code' }}
        </button>
        @if (error()) {
          <div class="error">{{ error() }}</div>
        }
      </form>
    } @else {
      <!-- Code Input -->
      <form (ngSubmit)="verifyCode()">
        <p class="info">Code sent to {{ phone }}. Check your Telegram app.</p>
        
        <div class="form-group">
          <label for="code">Verification Code</label>
          <input
            type="text"
            id="code"
            [(ngModel)]="code"
            name="code"
            placeholder="Enter 5 digit code"
            maxlength="5"
            required
          />
        </div>
        
        <button type="submit" [disabled]="loading()">
          {{ loading() ? 'Verifying...' : 'Verify Code' }}
        </button>
        
        <button type="button" (click)="backToPhone()" [disabled]="loading()">
          Back
        </button>
        
        @if (error()) {
          <div class="error">{{ error() }}</div>
        }
      </form>
    }
  </div>
</div>
