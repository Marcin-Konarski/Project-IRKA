<section class="mx-auto w-full max-w-md px-4 py-8 sm:py-12">
  <div class="w-full">
    @if (!codeRequested()) {
      <form (ngSubmit)="requestCode()" class="w-full" novalidate>
        <fieldset class="fieldset border-base-300 rounded-box w-full border p-5">
          <legend class="fieldset-legend">Telegram verification</legend>

          <p class="mb-2 text-sm">Enter your phone number with country code.</p>

          <label class="floating-label mt-2">
            <span>Phone number</span>
            <input
              type="tel"
              [(ngModel)]="phone"
              name="phone"
              placeholder="e.g. +48123456789"
              class="input input-bordered w-full"
              required
            />
          </label>

          <button type="submit" class="btn btn-neutral mt-4 w-full" [disabled]="loading()">
            {{ loading() ? 'Sending code...' : 'Send verification code' }}
          </button>
        </fieldset>
      </form>
    } @else {
      <form (ngSubmit)="verifyCode()" class="w-full" novalidate>
        <fieldset class="fieldset border-base-300 rounded-box w-full border p-5">
          <legend class="fieldset-legend">Telegram verification</legend>

          <p class="mb-2 text-sm">Code sent to {{ phone }}.</p>

          <label class="floating-label mt-2">
            <span>Code (5-6 digits)</span>
            <input
              type="text"
              [(ngModel)]="code"
              name="code"
              placeholder="12345"
              maxlength="6"
              inputmode="numeric"
              class="input input-bordered w-full"
              required
            />
          </label>

          <button type="submit" class="btn btn-neutral mt-4 w-full" [disabled]="loading()">
            {{ loading() ? 'Verifying...' : 'Verify' }}
          </button>

          <button type="button" class="btn btn-ghost mt-2 w-full" (click)="backToPhone()" [disabled]="loading()">
            Change number
          </button>
        </fieldset>
      </form>
    }

    @if (error()) {
      <div class="alert alert-error mt-4">
        <span>{{ error() }}</span>
      </div>
    }
  </div>
</section>
