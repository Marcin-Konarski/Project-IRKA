services:

  # Postgres db
  postgres:
    image: postgres:18.1-bookworm
    container_name: IRKA_database
    ports:
      - "127.0.0.1:5432:5432" #! Development only, remove to make it container-only
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - datairka:/var/lib/postgresql/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 3s
      timeout: 5s
      retries: 15
    restart: unless-stopped


